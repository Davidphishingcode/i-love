<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edlawit 3D Heart</title>
    <style>
        /* ዳራው ጥቁር እንዲሆንና ስክሪኑን እንዲሞላ */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const words = [];
    const wordText = "i love you";
    const centerName = "EDLAWIT";
    const totalWords = 200; 
    let isDeep = false;

    // የልብ ቅርጽ ቀመር
    function getHeartPoint(t) {
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        return { x: x * 12, y: y * 12 };
    }

    class Particle {
        constructor(index) {
            this.index = index;
            this.t = (index / totalWords) * Math.PI * 2;
            this.z = Math.random() * 100;
            this.speed = 0.01; // መካከለኛ ፍጥነት
        }

        update() {
            this.t += this.speed;
            // 3D ጥልቀት ስሜት
            this.z = Math.sin(Date.now() * 0.001 + this.index) * 40 + 50;
        }

        draw() {
            const pos = getHeartPoint(this.t);
            const scale = 300 / (300 + this.z);
            const x = canvas.width / 2 + pos.x * scale;
            const y = canvas.height / 2 + pos.y * scale;
            const fontSize = 12 * scale;

            ctx.font = `bold ${fontSize}px Arial`;
            ctx.fillStyle = `rgba(255, 0, 128, ${scale})`; // ሮዝ ቀለም
            ctx.fillText(wordText, x, y);
        }
    }

    for (let i = 0; i < totalWords; i++) {
        words.push(new Particle(i));
    }

    function animate() {
        // ዳራው ጥቁር እንዲሆን እያንዳንዱ Frame ላይ ይሳላል
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // መሃል ላይ ያለው ስም
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ff0080";
        ctx.fillStyle = "white";
        ctx.font = "bold 40px Arial";
        ctx.textAlign = "center";
        ctx.fillText(centerName, canvas.width / 2, canvas.height / 2 + 10);
        ctx.shadowBlur = 0;

        words.forEach(p => {
            p.update();
            p.draw();
        });

        requestAnimationFrame(animate);
    }

    // ስክሪኑን ሲነኩት የ 3D ጥልቀቱ እንዲጨምር
    window.addEventListener('mousedown', () => {
        words.forEach(p => p.speed = 0.03); // ፍጥነት ይጨምራል
    });
    window.addEventListener('mouseup', () => {
        words.forEach(p => p.speed = 0.01); // ፍጥነት ይመለሳል
    });

    animate();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
